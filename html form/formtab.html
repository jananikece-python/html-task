</head>

    table,th,td{
        border:2px solid black;
    }
    th{
        text-align: center;
        border-collapse:collapse ;
    }
</style>
<body>
    <table>
        <th>Fill the form below</th>
        <tr>
            <td><label for="name">Name</label></td>
             <td><input type="text"></td>   
        </tr>
        <tr>
            <td><label for="password">Password</label></td>
             <td><input type="password"></td>   
        </tr>
        <tr>
            <td><label for="feedback">Feedback</label></td>
             <td><input type="text"></td>   
        </tr>

            <td><label for="gender">Gender</label></td>
             <td><input type="radio">Male
            <input type="radio">Female</td>   
        </tr>
        <tr>
            <td><label for="subject">Subject</label></td>
             <td><input type="checkbox">Web
            <input type="checkbox">Math
            <input type="checkbox">Graphics
            <input type="checkbox">English
           </td>   
        </tr>
        <tr>
            <td></td>
            <td><button>Reset All</button>
            <button>Submit Above Details</button></td>
        </tr>
