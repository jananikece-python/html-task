<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .a
    {
        text-align: center;
    }
</style>
<body>
    <form>
    <h2 style="color: blue;">Please complete our survey</h2>
    <h3>Contact information</h3>
    <p style="color:blue">
        <label for="email" >Email address:</label>
        <input type="email" required>
    </p>
    <p style="color:blue">
        <label for="first name" >First Name:</label>
        <input type="text" required>
    </p>
    <p style="color:blue">
        <label for="last name" >Last Name:</label>
        <input type="text" required>
    </p>
    <h3>Geographic information</h3>
    <p style="color:blue">
        <label for="state">State:</label>
        <input type="text" required placeholder="Two characters">
    </p>
    <p style="color:blue">
        <label for="zip code">Zip code:</label>
        <input type="number" required placeholder="Five digits">
    </p>
    <h3>How did you hear about us?</h3>
    <p style="color:blue">
        <label>web search:</label>
        <input type="checkbox">
    </p>
    <p style="color:blue">
        <label>Facebook:</label>
        <input type="checkbox">
    </p>
    <p style="color:blue">
        <label>Twitter:</label>
        <input type="checkbox">
    </p>
    <p style="color:blue">
        <label>Email message:</label>
        <input type="checkbox">
    </p>
    <h3>Thank you for taking our survey!</h3>
    <div class="a">
    <button>submit</button>
    <button>Reset</button>
    </div>
